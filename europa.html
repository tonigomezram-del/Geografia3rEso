<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Geografia d'Europa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            pointer-events: none; /* Deixa fer clic al mapa a través de l'UI si no hi ha elements */
        }

        .header {
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: auto;
            border-bottom: 2px solid #3b82f6;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mode-btn {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .mode-btn:hover { background: #7c3aed; }
        .mode-btn.estudi-actiu { background: #f59e0b; }
        .mode-btn.estudi-actiu:hover { background: #d97706; }

        .target-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .target-title {
            font-size: 0.9rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .target-name {
            font-size: 2rem;
            font-weight: 800;
            color: #fbbf24;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .hint-display {
            font-size: 0.9rem;
            color: #a78bfa;
            margin-top: 5px;
            font-style: italic;
            max-width: 400px;
            text-align: center;
            display: none; /* S'amaga per defecte */
        }

        .stats-box {
            display: flex;
            gap: 30px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .intentos { color: #ef4444; }
        .puntuacio { color: #10b981; }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Modal final */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        .modal-content {
            background: #1f2937;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            border: 1px solid #374151;
            max-width: 400px;
        }

        .modal-content h1 { margin-top: 0; color: #fbbf24; }
        .modal-content button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .modal-content button:hover { background: #2563eb; }

        /* Estils dels marcadors */
        .custom-marker {
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid #fff;
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .custom-marker:hover {
            background-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.3);
        }

        /* Estils per al popup d'estudi */
        .leaflet-popup-content-wrapper {
            background: #1f2937;
            color: #fff;
            border-radius: 8px;
            border: 1px solid #374151;
        }
        .leaflet-popup-tip {
            background: #1f2937;
        }
        .study-popup h3 {
            margin: 0 0 10px 0;
            color: #fbbf24;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
        }
        .study-popup p {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            color: #d1d5db;
        }
        .study-popup label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #a78bfa;
            cursor: pointer;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 5px;
        }
        .study-popup input[type="checkbox"] {
            accent-color: #8b5cf6;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        /* Tooltip al passar el ratolí */
        .leaflet-tooltip {
            background: rgba(0,0,0,0.8);
            border: 1px solid #4b5563;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .leaflet-tooltip-top:before { border-top-color: rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="header">
            <div class="header-left">
                <h2 style="margin: 0; font-size: 1.2rem;">Geografia d'Europa</h2>
                <button id="btn-mode" class="mode-btn" onclick="alternarMode()">Canviar a Mode Estudi</button>
            </div>
            <div class="target-box">
                <div class="target-title">On és...</div>
                <div id="target-name" class="target-name">Preparant...</div>
                <div id="hint-text" class="hint-display"></div>
            </div>
            <div class="stats-box">
                <div class="stat">
                    <div class="target-title">Intents</div>
                    <div id="attempts" class="stat-value intentos">4</div>
                </div>
                <div class="stat">
                    <div class="target-title">Punts</div>
                    <div id="score" class="stat-value puntuacio">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="modal">
        <div class="modal-content">
            <h1>Joc Finalitzat!</h1>
            <p>La teva nota final és:</p>
            <h2 id="final-score" style="font-size: 3rem; margin: 10px 0;">0 / 0</h2>
            <button onclick="iniciarJoc()">Tornar a jugar</button>
        </div>
    </div>

        // Configuració del mapa

        // Capa de mapa físic súper realista (Esri World Physical Map)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
}).addTo(map);

        let secuenciaJoc = [];
        let indexActual = 0;
        let intentsRestants = 4;
        let punts = 0;
        let elsMarcadors = {};
        let bloquejat = false;
        let modeEstudi = false; // Nou estat: false = Joc, true = Estudi

        function crearIcona(color) {
            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="width: 16px; height: 16px; background-color: ${color}; border-radius: 50%; border: 2px solid white;"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
        }

        function remenarArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Funció cridada pel checkbox del popup
        window.canviarPista = function(indexData, checkboxElem) {
            dadesGeografiques[indexData].useHint = checkboxElem.checked;
        };

        function alternarMode() {
            modeEstudi = !modeEstudi;
            const btn = document.getElementById('btn-mode');
            
            if (modeEstudi) {
                btn.innerText = "Tornar a Mode Joc";
                btn.classList.add('estudi-actiu');
                document.querySelector('.stats-box').style.display = 'none';
                document.getElementById('target-name').innerText = "Mode Estudi Activat";
                document.getElementById('hint-text').style.display = 'none';
                document.querySelector('.target-title').innerText = "Clica un punt per aprendre";
                carregarPuntsEstudi();
            } else {
                btn.innerText = "Canviar a Mode Estudi";
                btn.classList.remove('estudi-actiu');
                document.querySelector('.stats-box').style.display = 'flex';
                document.querySelector('.target-title').innerText = "On és...";
                iniciarJoc(); // Reinicia el joc al tornar
            }
        }

        function netejarMarcadors() {
            for (let clau in elsMarcadors) {
                map.removeLayer(elsMarcadors[clau]);
            }
            elsMarcadors = {};
        }

        // Càrrega especial per al Mode Estudi
        function carregarPuntsEstudi() {
            netejarMarcadors();
            
            dadesGeografiques.forEach((lloc, index) => {
                const marcador = L.marker([lloc.lat, lloc.lng], {
                    icon: crearIcona('#f59e0b') // Color carabassa d'estudi
                }).addTo(map);

                // Mostra el nom al passar el ratolí
                marcador.bindTooltip(lloc.name, {
                    direction: 'top',
                    offset: [0, -10]
                });

                // HTML del popup al fer clic
                const popupContent = `
                    <div class="study-popup">
                        <h3>${lloc.name}</h3>
                        <p>${lloc.hint}</p>
                        <label>
                            <input type="checkbox" onchange="canviarPista(${index}, this)" ${lloc.useHint ? 'checked' : ''}>
                            Activar pista al joc per a aquest lloc
                        </label>
                    </div>
                `;
                
                marcador.bindPopup(popupContent);
                elsMarcadors[lloc.name] = marcador;
            });
        }

        // Càrrega normal per al Mode Joc
        function carregarPunts() {
            netejarMarcadors();

            dadesGeografiques.forEach(lloc => {
                const marcador = L.marker([lloc.lat, lloc.lng], {
                    icon: crearIcona('rgba(255, 255, 255, 0.3)') // Color inicial neutre i semitransparent
                }).addTo(map);

                marcador.on('click', () => gestionarClic(lloc.name, marcador));
                elsMarcadors[lloc.name] = marcador;
            });
        }

        function iniciarJoc() {
            if (modeEstudi) return; // Si estem estudiant, no iniciem el joc intern
            
            document.getElementById('modal').style.display = 'none';
            secuenciaJoc = remenarArray([...dadesGeografiques]);
            indexActual = 0;
            punts = 0;
            carregarPunts();
            actualitzarUI();
        }

        function actualitzarUI() {
            if (indexActual >= secuenciaJoc.length) {
                finalitzarJoc();
                return;
            }
            
            const llocActual = secuenciaJoc[indexActual];
            document.getElementById('target-name').innerText = llocActual.name;
            
            // Lògica de les pistes al Mode Joc
            const hintDisplay = document.getElementById('hint-text');
            if (llocActual.useHint) {
                hintDisplay.innerText = "💡 Pista: " + llocActual.hint;
                hintDisplay.style.display = 'block';
            } else {
                hintDisplay.style.display = 'none';
            }

            intentsRestants = 4;
            document.getElementById('attempts').innerText = intentsRestants;
            document.getElementById('score').innerText = `${punts} / ${secuenciaJoc.length}`;
            bloquejat = false;
        }

        function gestionarClic(nomClicat, marcador) {
            if (bloquejat || modeEstudi) return;

            const nomObjectiu = secuenciaJoc[indexActual].name;

            if (nomClicat === nomObjectiu) {
                // CORRECTE
                bloquejat = true;
                punts++;
                marcador.setIcon(crearIcona('#10b981')); // Verd
                
                setTimeout(() => {
                    marcador.setOpacity(0.2);
                    indexActual++;
                    actualitzarUI();
                }, 1000);

            } else {
                // INCORRECTE
                if (intentsRestants > 1) {
                    intentsRestants--;
                    document.getElementById('attempts').innerText = intentsRestants;
                    
                    marcador.setIcon(crearIcona('#ef4444')); // Vermell
                    setTimeout(() => {
                        if (elsMarcadors[nomClicat] && !modeEstudi) {
                            marcador.setIcon(crearIcona('rgba(255, 255, 255, 0.3)'));
                        }
                    }, 500);
                } else {
                    bloquejat = true;
                    document.getElementById('attempts').innerText = "0";
                    
                    const marcadorCorrecte = elsMarcadors[nomObjectiu];
                    marcadorCorrecte.setIcon(crearIcona('#fbbf24')); // Groc alertant
                    
                    map.flyTo([secuenciaJoc[indexActual].lat, secuenciaJoc[indexActual].lng], map.getZoom());

                    setTimeout(() => {
                        marcadorCorrecte.setOpacity(0.2);
                        indexActual++;
                        actualitzarUI();
                    }, 2500);
                }
            }
        }

        function finalitzarJoc() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('final-score').innerText = `${punts} / ${dadesGeografiques.length}`;
            
            const nota = document.getElementById('final-score');
            if (punts > dadesGeografiques.length * 0.8) {
                nota.style.color = '#10b981';
            } else if (punts > dadesGeografiques.length * 0.5) {
                nota.style.color = '#fbbf24';
            } else {
                nota.style.color = '#ef4444';
            }
            
            // Amaguem la pista final
            document.getElementById('hint-text').style.display = 'none';
        }

        // Inicia el joc al carregar per primera vegada
        iniciarJoc();
    </script>
<!-- ========================================== -->
