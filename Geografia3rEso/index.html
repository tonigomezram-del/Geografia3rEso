<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geografia 3r - Atles Interactiu</title>
    
    <!-- Fonts elegants per a Geografia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Llibreria 3D Globe.gl (Tecnologia WebGL avançada) -->
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        /* Reset bàsic */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden; 
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* Contenidor del globus terraqüi 3D */
        #globeViz {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            cursor: grab;
        }

        #globeViz:active {
            cursor: grabbing;
        }

        /* Capa de transició per fer el fos a negre perfecte MENTRE es mou */
        #transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            /* La transició ara és suau però ràpida per adaptar-se al moviment */
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Panell d'interfície (UI) flotant */
        .ui-panel {
            position: absolute;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
            width: 400px;
            z-index: 10;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideIn 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            transition: opacity 0.6s ease, transform 0.6s ease; 
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50px, -50%); }
            to { opacity: 1; transform: translate(0, -50%); }
        }

        /* Capçalera i Títol */
        header {
            text-align: left;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        h2 {
            font-size: 1rem;
            font-weight: 300;
            color: #a0aec0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Botons dels Continents */
        .continents-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-continent {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 10px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-continent::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-continent:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-continent:hover::before {
            left: 100%;
        }

        .btn-continent span {
            font-size: 0.8rem;
            color: #8bb4e7;
            font-weight: 300;
        }

        /* =========================================
           ESTILS AVANÇATS DEL MARCADOR SVG (PIN)
           ========================================= */
        .pin-container {
            pointer-events: none; /* Evita que talli la interacció del ratolí amb el mapa */
        }

        .pin-wrapper {
            position: relative;
            width: 60px;
            height: 60px;
            /* Això centra EXACTAMENT la punta inferior al punt cardinal del satèl·lit */
            transform: translate(-50%, -100%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transition: opacity 0.8s ease; /* Pel desvaniment en moviment */
        }

        /* SVG del Pin d'Alta Qualitat */
        .pin-svg {
            width: 32px;
            height: auto;
            z-index: 2;
            transform-origin: bottom center;
            animation: pinEpicDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.5));
        }

        /* L'ombra a terra (dona l'efecte d'estar tocant el mapa) */
        .pin-shadow {
            position: absolute;
            bottom: 0px;
            width: 24px;
            height: 8px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            filter: blur(3px);
            z-index: 1;
            animation: shadowEpicDrop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* L'ona expansiva super realista (Radar de localització) */
        .map-pulse {
            position: absolute;
            bottom: -11px; /* Centrat sota la punta */
            width: 30px;
            height: 30px;
            background: transparent;
            border: 2px solid rgba(255, 75, 75, 0.8);
            border-radius: 50%;
            transform: rotateX(75deg); /* Plegat a terra perquè sembli 3D */
            animation: epicPulseRing 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
            animation-delay: 0.6s; /* S'activa en tocar terra */
            opacity: 0;
            z-index: 0;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.5) inset, 0 0 15px rgba(255, 50, 50, 0.5);
        }

        /* Animacions clau */
        @keyframes pinEpicDrop {
            0% { transform: translateY(-100px) scale(0.2); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes shadowEpicDrop {
            0% { transform: scale(0.1); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes epicPulseRing {
            0% { transform: rotateX(75deg) scale(0.5); opacity: 1; border-width: 4px; }
            100% { transform: rotateX(75deg) scale(4); opacity: 0; border-width: 0px; }
        }

        /* Responsivitat per a pantalles petites */
        @media (max-width: 768px) {
            .ui-panel {
                top: auto;
                bottom: 5%;
                left: 5%;
                transform: translateY(0);
                width: 90%;
                padding: 20px;
            }
            h1 { font-size: 2.5rem; }
            .btn-continent { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Pantalla negra per a la transició fina en moviment -->
    <div id="transition-overlay"></div>

    <!-- Contenidor on es dibuixarà la Terra en 3D -->
    <div id="globeViz"></div>

    <!-- Interfície d'usuari elegant -->
    <main class="ui-panel" id="mainUI">
        <header>
            <h1>Geografia 3r</h1>
            <h2>Atles Global Interactiu</h2>
        </header>

        <!-- Navegació. Altitudes originals per l'Hover -->
        <nav class="continents-nav">
            <a href="america.html" class="btn-continent" data-lat="15" data-lng="-90" data-alt="1.3">
                Amèrica <span>Explorar &rarr;</span>
            </a>
            <a href="africa.html" class="btn-continent" data-lat="5" data-lng="20" data-alt="1.2">
                Àfrica <span>Explorar &rarr;</span>
            </a>
            <a href="europa.html" class="btn-continent" data-lat="50" data-lng="15" data-alt="0.9">
                Europa <span>Explorar &rarr;</span>
            </a>
            <a href="asia.html" class="btn-continent" data-lat="35" data-lng="95" data-alt="1.2">
                Àsia <span>Explorar &rarr;</span>
            </a>
        </nav>
    </main>

    <script>
        // Inicialitzem el Globus 3D
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('#4b80b5')
            .atmosphereAltitude(0.15)
            // Configurem l'altitud del marcador perquè floti per sobre del relleu muntanyós i no causi efecte de "desviament"
            .htmlAltitude('alt') 
            .htmlElementsData([]) // Comença buit
            .htmlElement(d => {
                const el = document.createElement('div');
                el.className = 'pin-container';
                // Utilitzem un gràfic SVG inserit brutal en lloc de CSS cutre
                el.innerHTML = `
                    <div class="pin-wrapper" id="the-pin">
                        <div class="map-pulse"></div>
                        <div class="pin-shadow"></div>
                        <svg class="pin-svg" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path d="M12 0C5.373 0 0 5.373 0 12c0 8.542 12 24 12 24s12-15.458 12-24c0-6.627-5.373-12-12-12z" fill="url(#pinGrad)" />
                            <circle cx="12" cy="12" r="5" fill="#ffffff" />
                        </svg>
                    </div>
                `;
                return el;
            });

        // Configuració de la càmera i rotació
        const controls = world.controls();
        controls.autoRotate = true;       
        controls.autoRotateSpeed = 0.8;   
        controls.enableZoom = true;       
        controls.minDistance = 150;       
        controls.maxDistance = 400;       

        // Punts de vista inicial
        world.pointOfView({ lat: 20, lng: 0, altitude: 3 }, 0);
        setTimeout(() => {
            world.pointOfView({ lat: 20, lng: 0, altitude: 1.8 }, 3000);
        }, 100);

        let isAnimatingToDestination = false;
        const uiPanel = document.getElementById('mainUI');
        const overlay = document.getElementById('transition-overlay');
        const buttons = document.querySelectorAll('.btn-continent');
        
        buttons.forEach(btn => {
            // LÒGICA D'HOVER (Igual que abans)
            btn.addEventListener('mouseenter', (e) => {
                if (isAnimatingToDestination) return;
                controls.autoRotate = false;
                const lat = parseFloat(e.currentTarget.getAttribute('data-lat'));
                const lng = parseFloat(e.currentTarget.getAttribute('data-lng'));
                const alt = parseFloat(e.currentTarget.getAttribute('data-alt'));
                world.pointOfView({ lat: lat, lng: lng, altitude: alt }, 1200);
            });

            btn.addEventListener('mouseleave', () => {
                if (!isAnimatingToDestination) controls.autoRotate = true;
            });

            // LÒGICA DE CLIC: CINE PURO
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isAnimatingToDestination) return;
                isAnimatingToDestination = true;

                const targetUrl = e.currentTarget.getAttribute('href');
                const lat = parseFloat(e.currentTarget.getAttribute('data-lat'));
                const lng = parseFloat(e.currentTarget.getAttribute('data-lng'));

                // 1. Amaguem la interfície cap a l'esquerra mentre l'esvaim
                uiPanel.style.opacity = '0';
                uiPanel.style.transform = 'translate(-80px, -50%) scale(0.9)';
                uiPanel.style.pointerEvents = 'none';

                // 2. Afegim el Pin. (alt: 0.02 el manté una mica amunt perquè no es talli amb les muntanyes)
                world.htmlElementsData([{ lat: lat, lng: lng, alt: 0.02 }]);

                // 3. FASE 1: RETROCÉS (Anticipació). Ens allunyem per agafar "carrera"
                const currentAlt = world.pointOfView().altitude;
                world.pointOfView({ lat: lat, lng: lng, altitude: currentAlt + 0.6 }, 1000);

                // Esperem que acabi el retrocés i l'animació de caiguda del pin (1000ms)
                setTimeout(() => {
                    
                    // 4. FASE 2: ACELERACIÓ I CAIGUDA LLIURE (Zoom extrem en 2800ms)
                    world.pointOfView({ lat: lat, lng: lng, altitude: 0.005 }, 2800);

                    // 5. FASE 3: DESVANIMENT MENTRE ES MOU
                    // A la meitat de la caiguda (als 1400ms d'aquells 2800ms), comencem a fondre.
                    setTimeout(() => {
                        // El pin es fon primer perquè no es noti la deformació en apropar-se a terra
                        const pinWrap = document.getElementById('the-pin');
                        if (pinWrap) {
                            pinWrap.style.opacity = '0';
                        }
                        
                        // La pantalla comença a fondre's a negre MENTRE la càmera segueix avançant
                        overlay.style.opacity = '1';
                    }, 1400); 

                    // 6. FASE 4: TRANSICIÓ EXACTA. El zoom acaba als 2800ms exactes, just quan està tot fosc
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 2800);

                }, 1100); // 100ms extra de pausa cinematogràfica després del retrocés abans de la caiguda
            });
        });
    </script>
</body>
</html>
